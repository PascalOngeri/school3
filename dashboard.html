<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Summary</title>
    <link rel="stylesheet" href="path/to/your/styles.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        /* Add your custom styles here */
    </style>
</head>
<body>
    <div class="container-fluid page-body-wrapper">
        <!-- Header -->
        <header>
            <!-- Include your header here -->
            <h1>Welcome to Infinity Schools</h1>
        </header>
        
        <div class="main-panel">
            <div class="content-wrapper">
                <div class="row">
                    <div class="col-md-12 grid-margin">
                        <div class="card">
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-12">
                                        <div class="d-sm-flex align-items-baseline report-summary-header">
                                            <h5 class="font-weight-semibold">Report Summary</h5>
                                            <span class="ml-auto">Updated Report</span>
                                            <button class="btn btn-icons border-0 p-2"><i class="icon-refresh"></i></button>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 report-inner-cards-wrapper">
                                        <div class="report-inner-card color-1">
                                            <div class="inner-card-text text-white">
                                                <span class="report-title">Total Class</span>
                                                <h4><!-- Total Class Count --></h4>
                                                <a href="manage-class.html"><span class="report-count"> View Classes</span></a>
                                            </div>
                                            <div class="inner-card-icon">
                                                <i class="icon-rocket"></i>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6 report-inner-cards-wrapper">
                                        <div class="report-inner-card color-2">
                                            <div class="inner-card-text text-white">
                                                <span class="report-title">Total Students</span>
                                                <h4><!-- Total Students Count --></h4>
                                                <a href="manage-students.html"><span class="report-count"> View Students</span></a>
                                            </div>
                                            <div class="inner-card-icon">
                                                <i class="icon-user"></i>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6 report-inner-cards-wrapper">
                                        <div class="report-inner-card color-3">
                                            <div class="inner-card-text text-white">
                                                <span class="report-title">Total Class Notice</span>
                                                <h4><!-- Total Notices Count --></h4>
                                                <a href="manage-notice.html"><span class="report-count"> View Notices</span></a>
                                            </div>
                                            <div class="inner-card-icon">
                                                <i class="icon-doc"></i>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6 report-inner-cards-wrapper">
                                        <div class="report-inner-card color-4">
                                            <div class="inner-card-text text-white">
                                                <span class="report-title">Total Public Notice</span>
                                                <h4><!-- Total Public Notices Count --></h4>
                                                <a href="manage-public-notice.html"><span class="report-count"> View Public Notices</span></a>
                                            </div>
                                            <div class="inner-card-icon">
                                                <i class="icon-doc"></i>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-12">
                                        <div id="piechart" style="width: 100%; height: 500px;"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <footer>
                <!-- Include your footer here -->
                <p>&copy; 2024 Infinity Schools. All rights reserved.</p>
            </footer>
        </div>
    </div>

    <script type="text/javascript">
        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(drawChart);

        function drawChart() {
            var data = google.visualization.arrayToDataTable([
                ['Task', 'Hours per Day'],
                ['Total Class',     4],
                ['Total Students',  10],
                ['Total Class Notice',  2],
                ['Total Public Notice', 2]
            ]);

            var options = {
                title: 'My Daily Activities'
            };

            var chart = new google.visualization.PieChart(document.getElementById('piechart'));
            chart.draw(data, options);
        }
    </script>
</body>
</html>
